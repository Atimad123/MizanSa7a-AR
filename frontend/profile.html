<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NutriVoice AR — ملفي الشخصي</title>
  <!-- Google Fonts + Font Awesome (icônes) -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #f8fafc;
      color: #1e2a3a;
      line-height: 1.5;
    }

    /* navigation moderne */
    .navbar {
      background: #ffffff;
      backdrop-filter: blur(0);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid #e9eef3;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 800;
      color: #1e7b4e;
    }
    .logo i {
      font-size: 1.8rem;
      background: #eaf9f1;
      padding: 8px;
      border-radius: 16px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .nav-links a, .nav-links button {
      text-decoration: none;
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #2c5a42;
    }
    .nav-links a:hover, .nav-links button:hover {
      background: #eef4f0;
    }
    .user-badge {
      background: #eef4f0;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      color: #1e7b4e;
      margin-left: 0.5rem;
    }
    .danger-btn {
      color: #c0392b !important;
    }
    .danger-btn:hover {
      background: #fee9e7 !important;
    }

    /* conteneur principal */
    .container {
      max-width: 680px;
      margin: 2rem auto;
      padding: 0 1.5rem 3rem;
    }

    /* cartes */
    .card {
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
      padding: 2rem 1.8rem;
      margin-bottom: 2rem;
      border: 1px solid #eef2f6;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08);
    }

    .card-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #1f3b2c;
      border-right: 5px solid #2ecc71;
      padding-right: 1rem;
    }
    .card-title i {
      font-size: 1.7rem;
      color: #2ecc71;
    }

    /* formulaire */
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5b7c6b;
      margin-bottom: 0.5rem;
    }
    input, select {
      width: 100%;
      padding: 0.9rem 1rem;
      background: #fefefe;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      font-family: inherit;
      font-size: 1rem;
      color: #1e2a3a;
      transition: 0.2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #2ecc71;
      box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.15);
    }

    /* bouton principal */
    .btn-primary {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      border: none;
      width: 100%;
      padding: 1rem;
      font-size: 1.05rem;
      font-weight: 700;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #219653, #27ae60);
      box-shadow: 0 8px 20px rgba(39, 174, 96, 0.3);
    }

    /* zone de résultat */
    .needs-card {
      background: #ffffff;
      border-radius: 28px;
      border: 1px solid #eef2f6;
    }
    .result-box {
      background: #fbfdfc;
      border-radius: 24px;
      padding: 1.2rem;
    }
    .macro-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.9rem 0;
      border-bottom: 1px solid #e9edf2;
      font-size: 1rem;
    }
    .macro-label {
      font-weight: 700;
      color: #2c5a42;
    }
    .macro-value {
      font-weight: 800;
      font-size: 1.2rem;
      color: #1e7b4e;
    }
    .status-msg {
      background: #f4f9f6;
      border-radius: 20px;
      padding: 0.8rem;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #4b6e5c;
      transition: 0.2s;
    }
    hr {
      margin: 1rem 0;
      border: none;
      height: 1px;
      background: linear-gradient(to right, #e2e8f0, transparent);
    }
    @media (max-width: 560px) {
      .container { padding: 0 1rem 2rem; }
      .card { padding: 1.5rem; }
      .card-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <i class="fas fa-utensils"></i>
    <span>Nutri<span style="color:#2ecc71;">Voice</span> AR</span>
  </div>
  <div class="nav-links">
    <span class="user-badge" id="navUser">—</span>
    <a href="/index"><i class="fas fa-home"></i> الرئيسية</a>
    <a href="/stats"><i class="fas fa-chart-line"></i> إحصائيات</a>
    <button class="danger-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
  </div>
</nav>

<main class="container">
  <!-- carte profil -->
  <div class="card">
    <div class="card-title">
      <i class="fas fa-user-edit"></i>
      <span>بياناتي الشخصية</span>
    </div>
    <div class="form-group">
      <label><i class="fas fa-venus-mars"></i> الجنس</label>
      <select id="gender">
        <option value="male">ذكر</option>
        <option value="female">أنثى</option>
      </select>
    </div>
    <div class="form-group">
      <label><i class="fas fa-birthday-cake"></i> العمر (سنة)</label>
      <input type="number" id="age" placeholder="مثال: 28">
    </div>
    <div class="form-group">
      <label><i class="fas fa-weight-scale"></i> الوزن (كغ)</label>
      <input type="number" step="0.1" id="weight" placeholder="مثال: 70.5">
    </div>
    <div class="form-group">
      <label><i class="fas fa-ruler"></i> الطول (سم)</label>
      <input type="number" step="0.1" id="height" placeholder="مثال: 175">
    </div>
    <div class="form-group">
      <label><i class="fas fa-person-walking"></i> مستوى النشاط</label>
      <select id="activity">
        <option value="sedentary">قليل الحركة (مكتبي)</option>
        <option value="light">خفيف (رياضة 1-2 مرات/أسبوع)</option>
        <option value="moderate">متوسط (3-5 مرات/أسبوع)</option>
        <option value="active">نشيط (رياضة يومية)</option>
        <option value="very_active">نشيط جداً (رياضة مكثفة)</option>
      </select>
    </div>
    <div class="form-group">
      <label><i class="fas fa-bullseye"></i> الهدف</label>
      <select id="goal">
        <option value="maintain">الحفاظ على الوزن</option>
        <option value="lose">خسارة الوزن (نقص تدريجي)</option>
        <option value="gain">زيادة الوزن / بناء عضلات</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveProfile()">
      <i class="fas fa-save"></i> حفظ وحساب احتياجاتي
    </button>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <!-- carte des besoins (cachée au départ) -->
  <div class="card needs-card" id="needsCard" style="display: none;">
    <div class="card-title">
      <i class="fas fa-chart-simple"></i>
      <span>احتياجاتي اليومية</span>
    </div>
    <div class="result-box">
      <div class="macro-bar">
        <span class="macro-label"><i class="fas fa-fire-flame-curved"></i> السعرات الحرارية</span>
        <span class="macro-value" id="tdee">-</span> <span>kcal</span>
      </div>
      <div class="macro-bar">
        <span class="macro-label"><i class="fas fa-drumstick-bite"></i> البروتين</span>
        <span class="macro-value" id="proteinGoal">-</span> <span>g</span>
      </div>
      <div class="macro-bar">
        <span class="macro-label"><i class="fas fa-bread-slice"></i> الكربوهيدرات</span>
        <span class="macro-value" id="carbsGoal">-</span> <span>g</span>
      </div>
      <div class="macro-bar">
        <span class="macro-label"><i class="fas fa-oil-can"></i> الدهون</span>
        <span class="macro-value" id="fatGoal">-</span> <span>g</span>
      </div>
      <div class="macro-bar">
        <span class="macro-label"><i class="fas fa-flag-checkered"></i> الهدف</span>
        <span class="macro-value" id="goalDesc">-</span>
      </div>
    </div>
  </div>
</main>

<script>
  const token = localStorage.getItem('nutrivoice_token');
  if (!token) window.location.href = '/login';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  async function loadUser() {
    try {
      const res = await fetch('/api/auth/me', { headers: authHeaders() });
      const d = await res.json();
      if (d.status === 'success') document.getElementById('navUser').innerHTML = `<i class="fas fa-user-circle"></i> ${d.user.username}`;
      else logout();
    } catch { logout(); }
  }

  function logout() {
    localStorage.removeItem('nutrivoice_token');
    window.location.href = '/login';
  }

  async function saveProfile() {
    const gender = document.getElementById('gender').value;
    const age = parseInt(document.getElementById('age').value);
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value);
    const activity = document.getElementById('activity').value;
    const goal = document.getElementById('goal').value;

    if (!age || !weight || !height) {
      showStatus('⚠️ الرجاء ملء جميع الحقول (العمر، الوزن، الطول)', 'error');
      return;
    }

    showStatus('⏳ جاري الحساب وحفظ الملف...', 'loading');
    try {
      const res = await fetch('/api/user/profile', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ gender, age, weight, height, activity_level: activity, goal })
      });
      const data = await res.json();
      if (data.status === 'success') {
        displayNeeds(data.needs);
        showStatus('✅ تم حفظ الملف الشخصي بنجاح', 'success');
      } else {
        showStatus('❌ خطأ: ' + (data.error || 'حدث خطأ'), 'error');
      }
    } catch(e) {
      showStatus('❌ فشل الاتصال بالخادم', 'error');
    }
  }

  function displayNeeds(needs) {
    const needsCard = document.getElementById('needsCard');
    needsCard.style.display = 'block';
    document.getElementById('tdee').innerText = Math.round(needs.tdee);
    document.getElementById('proteinGoal').innerText = needs.protein_g.toFixed(1);
    document.getElementById('carbsGoal').innerText = needs.carbs_g.toFixed(1);
    document.getElementById('fatGoal').innerText = needs.fat_g.toFixed(1);
    let goalText = '';
    switch (needs.goal) {
      case 'maintain': goalText = 'الحفاظ على الوزن'; break;
      case 'lose': goalText = 'خسارة الوزن (نقص 500 سعرة/يوم)'; break;
      case 'gain': goalText = 'زيادة الوزن (زيادة 500 سعرة/يوم)'; break;
      default: goalText = needs.goal;
    }
    document.getElementById('goalDesc').innerText = goalText;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.innerHTML = msg;
    el.style.color = type === 'error' ? '#c0392b' : (type === 'success' ? '#1e7b4e' : '#f39c12');
    el.style.background = type === 'error' ? '#fee9e7' : (type === 'success' ? '#e0f2e9' : '#fff3e0');
    setTimeout(() => {
      if (type !== 'loading') {
        setTimeout(() => { el.innerHTML = ''; el.style.background = '#f4f9f6'; }, 2000);
      }
    }, 2000);
  }

  // Charger le profil existant au démarrage
  async function loadProfile() {
    try {
      const res = await fetch('/api/user/profile', { headers: authHeaders() });
      const data = await res.json();
      if (data.status === 'success' && data.profile) {
        document.getElementById('gender').value = data.profile.gender;
        document.getElementById('age').value = data.profile.age;
        document.getElementById('weight').value = data.profile.weight_kg;
        document.getElementById('height').value = data.profile.height_cm;
        document.getElementById('activity').value = data.profile.activity_level;
        document.getElementById('goal').value = data.profile.goal || 'maintain';
        if (data.needs) displayNeeds(data.needs);
      }
    } catch(e) { console.warn(e); }
  }

  loadUser();
  loadProfile();
</script>
</body>
</html>
