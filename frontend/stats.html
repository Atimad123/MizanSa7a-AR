<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriVoice AR — إحصائيات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --emerald: #1a8c5b;
    --emerald-light: #22a86e;
    --emerald-pale: #e6f4ed;
    --emerald-faint: #f0f9f4;
    --sage: #7aab8c;
    --bg: #f4f7f5;
    --bg2: #edf2ee;
    --white: #ffffff;
    --card: #ffffff;
    --border: #d3e8da;
    --border-strong: #b5d4c2;
    --text: #1a2e22;
    --text2: #2d4a38;
    --muted: #6b9478;
    --muted2: #9dbfaa;
    --error: #d94f4f;
    --warning: #d97706;
    --protein: #2563eb;
    --carbs: #d97706;
    --fat: #d94f4f;
    --shadow-sm: 0 2px 8px rgba(26,140,91,0.07);
    --shadow-md: 0 4px 20px rgba(26,140,91,0.1);
    --nav-h: 64px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100; height: var(--nav-h);
    background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; box-shadow: var(--shadow-sm);
  }
  .nav-brand {
    font-size: 19px; font-weight: 900;
    display: flex; align-items: center; gap: 10px; letter-spacing: -0.4px;
  }
  .nav-brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--emerald-pale), #c8ecd9);
    border: 1.5px solid var(--border-strong); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .nav-brand-text { color: var(--text); }
  .nav-brand-text span { color: var(--emerald); }
  .nav-links { display: flex; align-items: center; gap: 6px; }
  .nav-link {
    padding: 7px 14px; border-radius: 10px; color: var(--muted);
    text-decoration: none; font-size: 13px; font-weight: 600;
    transition: all 0.2s; cursor: pointer; border: none;
    background: none; font-family: 'Tajawal', sans-serif;
  }
  .nav-link:hover { color: var(--emerald); background: var(--emerald-faint); }
  .nav-link.danger { color: var(--error); }
  .nav-link.danger:hover { background: #fdf1f1; }

  /* ── MAIN ── */
  main { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 24px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .page-header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
  .page-header p { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 500; }

  /* ── PERIOD PILLS ── */
  .period-selector { display: flex; gap: 8px; }
  .period-btn {
    padding: 9px 22px;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 20px; color: var(--muted);
    font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.22s;
  }
  .period-btn:hover { border-color: var(--emerald); color: var(--emerald); background: var(--emerald-faint); }
  .period-btn.active {
    background: var(--emerald-faint);
    border-color: var(--emerald);
    color: var(--emerald);
    box-shadow: 0 2px 12px rgba(26,140,91,0.15);
  }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 22px 18px; text-align: center;
    box-shadow: var(--shadow-md); transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--emerald-light), #5dc9a0);
    opacity: 0; transition: opacity 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(26,140,91,0.14); }
  .stat-card:hover::after { opacity: 1; }
  .stat-icon {
    width: 44px; height: 44px;
    background: var(--emerald-faint); border: 1px solid var(--border);
    border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 12px;
  }
  .stat-value { font-size: 32px; font-weight: 900; color: var(--emerald); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; }

  /* ── CHART CARDS ── */
  .chart-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 14px; margin-bottom: 14px; }
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px;
    box-shadow: var(--shadow-md);
  }
  .chart-title { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.3px; margin-bottom: 20px; }
  .chart-container { height: 240px; }

  /* ── TOP FOODS ── */
  .top-foods {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px; box-shadow: var(--shadow-md);
  }
  .food-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .food-bar-rank {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--emerald-faint); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: var(--emerald); flex-shrink: 0;
  }
  .food-bar-name { min-width: 90px; font-size: 14px; font-weight: 700; color: var(--text2); }
  .food-bar-bg { flex: 1; background: var(--bg2); height: 9px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .food-bar-fill { height: 100%; background: linear-gradient(90deg, var(--emerald), var(--emerald-light)); border-radius: 6px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
  .food-bar-count { min-width: 36px; text-align: left; color: var(--muted); font-size: 13px; font-weight: 700; }

  /* ── STATES ── */
  .loading-state, .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px; line-height: 2;
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--emerald);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section-label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 18px; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-brand-icon">🥗</div>
    <div class="nav-brand-text">Nutri<span>Voice</span> AR</div>
  </div>
  <div class="nav-links">
    <a href="/index" class="nav-link">🏠 الرئيسية</a>
    <a href="/profile" class="nav-link">👤 ملفي الشخصي</a>
    <button class="nav-link danger" onclick="logout()">خروج</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <h1>📊 إحصائيات التغذية</h1>
      <p>تتبع تقدمك الغذائي بمرور الوقت</p>
    </div>
    <div class="period-selector">
      <button class="period-btn active" onclick="selectPeriod(7,this)">7 أيام</button>
      <button class="period-btn" onclick="selectPeriod(14,this)">14 يوم</button>
      <button class="period-btn" onclick="selectPeriod(30,this)">30 يوم</button>
    </div>
  </div>

  <div id="content">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      جاري تحميل البيانات...
    </div>
  </div>
</main>

<script>
Chart.defaults.color = '#6b9478';
Chart.defaults.borderColor = '#d3e8da';
Chart.defaults.font.family = "'Tajawal', sans-serif";

const token = localStorage.getItem('nutrivoice_token');
if (!token) window.location.href = '/login';
function authH() { return { 'Authorization': `Bearer ${token}` }; }
function logout() { localStorage.removeItem('nutrivoice_token'); window.location.href = '/login'; }

let calChart = null, macroChart = null;

function selectPeriod(days, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadStats(days);
}

async function loadStats(days = 7) {
  document.getElementById('content').innerHTML = `<div class="loading-state"><div class="loading-spinner"></div>جاري تحميل البيانات...</div>`;
  try {
    const res = await fetch(`/api/history/stats?days=${days}`, { headers: authH() });
    const data = await res.json();
    if (data.status === 'success') renderStats(data.summary);
    else document.getElementById('content').innerHTML = '<div class="empty-state">❌ خطأ في تحميل البيانات</div>';
  } catch {
    document.getElementById('content').innerHTML = '<div class="empty-state">❌ خطأ في الاتصال</div>';
  }
}

function renderStats(s) {
  if (s.total_meals === 0) {
    document.getElementById('content').innerHTML = `<div class="empty-state">🍽️ لا توجد بيانات بعد<br><small>سجّل وجباتك في الصفحة الرئيسية</small></div>`;
    return;
  }
  const avg = s.daily_averages;
  document.getElementById('content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">🍽️</div><div class="stat-value">${s.total_meals}</div><div class="stat-label">إجمالي الوجبات</div></div>
      <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-value">${Math.round(avg.calories)}</div><div class="stat-label">متوسط السعرات</div></div>
      <div class="stat-card"><div class="stat-icon">🥩</div><div class="stat-value">${avg.protein.toFixed(1)}</div><div class="stat-label">متوسط البروتين (غ)</div></div>
      <div class="stat-card"><div class="stat-icon">🍞</div><div class="stat-value">${avg.carbs.toFixed(1)}</div><div class="stat-label">متوسط الكربوهيدرات</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">📅 تطور السعرات الحرارية</div>
        <div class="chart-container"><canvas id="calChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🥗 توزيع المغذيات</div>
        <div class="chart-container"><canvas id="macroChart"></canvas></div>
      </div>
    </div>
    <div class="top-foods">
      <div class="section-label">🏆 الأغذية الأكثر استهلاكاً</div>
      <div id="topFoods"></div>
    </div>`;

  if (calChart) calChart.destroy();
  const trend = s.weekly_trend || [];
  calChart = new Chart(document.getElementById('calChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: trend.map(d => d.day || d.date?.slice(5)),
      datasets: [{
        label: 'سعرات حرارية',
        data: trend.map(d => d.calories),
        backgroundColor: 'rgba(26,140,91,0.15)',
        borderColor: '#22a86e',
        borderWidth: 2,
        borderRadius: 8,
        borderSkipped: false,
        hoverBackgroundColor: 'rgba(26,140,91,0.28)',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: 'rgba(211,232,218,0.7)' }, ticks: { color: '#6b9478' } },
        x: { grid: { display: false }, ticks: { color: '#6b9478' } }
      }
    }
  });

  if (macroChart) macroChart.destroy();
  const md = s.macro_distribution;
  macroChart = new Chart(document.getElementById('macroChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['بروتين', 'كربوهيدرات', 'دهون'],
      datasets: [{
        data: [md.protein, md.carbs, md.fat],
        backgroundColor: ['#2563eb', '#d97706', '#d94f4f'],
        borderColor: '#ffffff',
        borderWidth: 3,
        hoverBorderWidth: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#6b9478', padding: 18, font: { size: 13, weight: '600' } } }
      },
      cutout: '70%'
    }
  });

  const foods = s.top_foods || [];
  const max = foods[0]?.count || 1;
  document.getElementById('topFoods').innerHTML = foods.length
    ? foods.map((f, i) => `
        <div class="food-bar">
          <div class="food-bar-rank">${i+1}</div>
          <div class="food-bar-name">${f.name}</div>
          <div class="food-bar-bg"><div class="food-bar-fill" style="width:${f.count/max*100}%"></div></div>
          <div class="food-bar-count">${f.count}</div>
        </div>`).join('')
    : '<div class="empty-state" style="padding:20px">لا توجد بيانات</div>';
}

loadStats(7);
</script>
</body>
</html>
